syntax = "proto3";

option java_package = "ist.group29.depchain.network";
option java_outer_classname = "NetworkMessages";

import "consensus.proto";
import "client.proto";


message Message {
    string sender_id    = 1;  // Process ID of the sender
    int64 sequence_number = 2;  // Per-link monotonic counter (-1 for handshakes)

    oneof payload {
        Handshake    handshake     = 3;
        HandshakeAck handshake_ack = 4;
        DataMessage  data          = 5;
        AckMessage   ack           = 6;
    }
}

// DH key-exchange initiation, authenticated with RSA identity key.
message Handshake {
    bytes dh_public_key = 1; 
    bytes signature     = 2; 
}

// DH key-exchange response, authenticated with RSA identity key.
message HandshakeAck {
    bytes dh_public_key = 1; 
    bytes signature     = 2;  
}

// Application payload with HMAC integrity.
message DataMessage {
    bytes payload = 1;  
    bytes mac     = 2; 
}

// Acknowledgment with HMAC integrity.
message AckMessage {
    bytes mac = 1;  
}

// Application-level envelope for multiplexing message types over the wire.
message Envelope {
    oneof payload {
        ConsensusMessage     consensus            = 1;
        Transaction          transaction           = 2;
        TransactionResponse  transaction_response  = 3;
    }
}
